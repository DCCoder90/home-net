  ai_services:
    env:
      - "TZ=America/Chicago"
    mounts:
      - "/etc/localtime:/etc/localtime:ro"
    services:
      openclaw:
        dns:
          enabled: true
          domain_name: "claw.dcapi.app"
          internal: true
        network:
          internal: true
          service_port: 18789
          networks:
            - name: "br1"
              ip_address: "192.168.5.50"
        auth:
          enabled: false
          group: "AI"
        secrets:
          ANTHROPIC_API_KEY: "openclaw_anthropic_api_key"
          DISCORD_BOT_TOKEN: "openclaw_discord_bot_token"
          OPENCLAW_GATEWAY_TOKEN: "openclaw_gateway_token"
          TAUTULLI_API_KEY: "openclaw_tautulli_api_key"
          RADARR_API_KEY: "openclaw_radarr_api_key"
          SONARR_API_KEY: "openclaw_sonarr_api_key"
          TWILIO_ACCOUNT_SID: "twilio_account_sid"
          TWILIO_AUTH_TOKEN: "twilio_auth_token"
          ELEVENLABS_API_KEY: "elevenlabs_api_key"
          OPENAI_API_KEY: "openclaw_openai_api_key"
        service_name: "openclaw"
        image_name: "ghcr.io/openclaw/openclaw:latest"
        domain_name: "claw.dcapi.app"
        mounts:
          - "/mnt/cache/appdata/openclaw:/home/node/.openclaw"
        env:
          - "OPENCLAW_GATEWAY_BIND=lan"
          - "TAUTULLI_URL=http://192.168.5.30:8181"
          - "RADARR_URL=http://192.168.5.24:7878"
          - "SONARR_URL=http://192.168.5.23:8989"
          - "TZ=America/Chicago"
          - "GENERIC_TIMEZONE=America/Chicago"
          - "TEMPORAL_ADDRESS=192.168.5.62:7233"
          - "TEMPORAL_NAMESPACE=default"
      ai_chat:
        dns:
          enabled: true
          domain_name: "chat.mallett.family"
        network:
          internal: true
          service_port: 3000
          networks:
            - name: "br1"
              ip_address: "192.168.5.52"
        auth:
          enabled: false
        secrets:
          GATEWAY_TOKEN: "ai_chat_gateway_token"
          MYSQL_USER: "NET2_MYSQL_USER"
          MYSQL_PASSWORD: "NET2_MYSQL_PASSWORD"
        service_name: "ai-chat"
        image_name: "ghcr.io/dccoder90/ai-chat:70fd8e33b0758ca36026e61859dfc0f3b0958946"
        domain_name: "chat.mallett.family"
        mounts:
          - "/mnt/user/appdata/ai-chat/config:/app/config"
        env:
          - "GATEWAY_URL=http://192.168.5.50:18789/v1/chat/completions"
          - "AGENT_ID=main"
          - "AUTO_LOGOUT_MINUTES=5"
          - "NODE_TLS_REJECT_UNAUTHORIZED=0"
          - "DAYS_TO_KEEP=30"
          - "CONTEXT_MESSAGES=20"
          - "MYSQL_HOST=192.168.5.84"
          - "MYSQL_PORT=3306"
          - "MYSQL_DATABASE=ai_chat"
      ai_chat_worker:
        dns:
          enabled: false
        network:
          internal: true
          service_port: 3000
          networks:
            - name: "br1"
              ip_address: "192.168.5.53"
        auth:
          enabled: false
        secrets:
          GATEWAY_TOKEN: "ai_chat_gateway_token"
          OPENCLAW_GATEWAY_TOKEN: "openclaw_gateway_token"
          RADARR_API_KEY: "openclaw_radarr_api_key"
          SONARR_API_KEY: "openclaw_sonarr_api_key"
          DISCORD_BOT_TOKEN: "openclaw_discord_bot_token"
          DISCORD_CHANNEL_ID: "openclaw_discord_bot_channel_id"
        service_name: "ai-chat-worker"
        image_name: "ghcr.io/dccoder90/home-net-temporal-workers:sha-81ee3a9"
        mounts:
          - "/mnt/user/appdata/ai-chat/config:/app/config"
        env:
          - "RADARR_URL=http://192.168.5.24:7878"
          - "SONARR_URL=http://192.168.5.23:8989"
          - "OPENCLAW_GATEWAY_URL=http://192.168.5.50:18789"
          - "TEMPORAL_ADDRESS=192.168.5.62:7233"
          - "TEMPORAL_NAMESPACE=default"
      ollama:
        dns:
          enabled: false
        network:
          internal: true
          service_port: 11434
          networks:
            - name: "br1"
              ip_address: "192.168.5.51"
        auth:
          enabled: false
        service_name: "ollama"
        description: "Ollama is a local large language model runner."
        image_name: "ollama/ollama:latest"
        icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/ollama.png"
        devices:
          gpu: true
        env:
          - "NVIDIA_DRIVER_CAPABILITIES=all"
          - "NVIDIA_VISIBLE_DEVICES=GPU-465cc8f0-4775-edd3-5402-87cca1022307"
        mounts:
          - "/mnt/user/appdata/ollama:/root/.ollama"
