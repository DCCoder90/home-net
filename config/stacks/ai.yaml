  ai_services:
    env:
      - "TZ=America/Chicago"
    mounts:
      - "/etc/localtime:/etc/localtime:ro"
    services:
      n8n:
        dns:
          enabled: true
          domain_name: "n8n.dcapi.app"
        network:
          internal: false
          service_port: 5678
          networks:
            - name: "br1"
              ip_address: "192.168.5.49"
        auth:
          enabled: false
          group: "AI"
        icon: "https://cdn-icons-png.freepik.com/512/8246/8246323.png"
        service_name: "n8n"
        image_name: "n8nio/n8n:2.0.2"
        domain_name: "n8n.dcapi.app"
        mounts:
          - "/mnt/cache/appdata/n8n:/home/node/.n8n"
        env:
          - "N8N_SECURE_COOKIE=false"
          - "WEBHOOK_URL=https://n8n.dcapi.app/"
          - "GENERIC_TIMEZONE=America/Chicago"
      openclaw:
        dns:
          enabled: true
          domain_name: "claw.dcapi.app"
        network:
          internal: true
          service_port: 18789
          networks:
            - name: "br1"
              ip_address: "192.168.5.50"
        auth:
          enabled: false
          group: "AI"
        secrets:
          ANTHROPIC_API_KEY: "openclaw_anthropic_api_key"
          DISCORD_BOT_TOKEN: "openclaw_discord_bot_token"
          OPENCLAW_GATEWAY_TOKEN: "openclaw_gateway_token"
          TAUTULLI_API_KEY: "openclaw_tautulli_api_key"
          RADARR_API_KEY: "openclaw_radarr_api_key"
          SONARR_API_KEY: "openclaw_sonarr_api_key"
        service_name: "openclaw"
        image_name: "ghcr.io/openclaw/openclaw:latest"
        domain_name: "claw.dcapi.app"
        mounts:
          - "/mnt/cache/appdata/openclaw:/home/node/.openclaw"
        env:
          - "OPENCLAW_GATEWAY_BIND=lan"
          - "TAUTULLI_URL=https://mediastats.dcapi.app"
          - "RADARR_URL=http://192.168.5.24:7878"
          - "SONARR_URL=http://192.168.5.23:8989"
