monitoring:
  zone_name: "dcapi.app"
  env:
    - "TZ=America/Chicago"
  mounts:
    - "/etc/localtime:/etc/localtime:ro"
  generated_secrets:
  networks:
  services:
    prometheus:
      service_name: "prometheus"
      image_name: "prom/prometheus:v3.10.0"
      description: "A systems and service monitoring system. It collects metrics from configured targets at given intervals, evaluates rule expressions, displays the results, and can trigger alerts when specified conditions are observed."
      icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/prometheus.png"
      dns:
        enabled: false 
      auth:
        enabled: false
      network:
        internal: true
        service_port: 9090
        networks:
            - name: "br1" 
              ip_address: "192.168.5.55"
      mounts:
        - "/mnt/user/appdata/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml"
        - "/mnt/user/appdata/prometheus/prometheus/data:/prometheus"
      env:
        - "TZ=America/Chicago"
    grafana:
      icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/grafana.png"
      service_name: "grafana"
      description: "Enables you to query, visualize, alert on, and explore your metrics, logs, and traces wherever they’re stored."
      image_name: "grafana/grafana:12.3"
      dns:
          enabled: true
          domain_name: "monitor.dcapi.app"
      network:
          internal: true
          service_port: 3000
          networks:
            - name: "br1" 
              ip_address: "192.168.5.56"
      auth:
          enabled: true
          group: "Monitoring"
          oauth: 
            enabled: true
            keys:
              GF_AUTH_GENERIC_OAUTH_CLIENT_ID: "client_id"
              GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: "client_secret"
              GF_AUTH_GENERIC_OAUTH_AUTH_URL: "authorize_url"
              GF_AUTH_GENERIC_OAUTH_TOKEN_URL: "token_url"
              GF_AUTH_GENERIC_OAUTH_API_URL: "user_info_url"
              GF_AUTH_SIGNOUT_REDIRECT_URL: "sign_out_url"
            redirect_uris:
              - "login/generic_oauth"
            scopes:
              - "openid"
              - "email"
              - "profile"
      env:
        - "GF_SERVER_ROOT_URL=https://monitor.dcapi.app"
        - "GF_AUTH_GENERIC_OAUTH_ENABLED=true"
        - "GF_AUTH_GENERIC_OAUTH_NAME=authentik"
        - "GF_AUTH_GENERIC_OAUTH_SCOPES=openid email profile"
        - "GF_AUTH_OAUTH_AUTO_LOGIN=true"
        - "GF_USERS_AUTO_ASSIGN_ORG_ROLE=Admin"
        - "GF_AUTH_GENERIC_OAUTH_ALLOW_ASSIGN_GRAFANA_ADMIN=true"

      mounts:
        - "/mnt/user/appdata/grafana:/var/lib/grafana"
        - "/mnt/user/appdata/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources"
        - "/mnt/user/appdata/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards"
        - "/mnt/user/appdata/grafana/dashboards:/var/lib/grafana/dashboards"
    cadvisor:
      service_name: "cadvisor"
      image_name: "gcr.io/cadvisor/cadvisor:v0.52.1"
      description: "Analyzes resource usage and performance characteristics of running containers."
      icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/cadvisor.png"
      dns:
        enabled: false
      auth:
        enabled: false
      network:
        internal: true
        service_port: 8080
        networks:
          - name: "br1"
            ip_address: "192.168.5.58"
      mounts:
        - "/:/rootfs:ro"
        - "/var/run:/var/run:ro"
        - "/sys:/sys:ro"
        - "/var/lib/docker/:/var/lib/docker:ro"
        - "/dev/disk/:/dev/disk:ro"
      commands: ["--housekeeping_interval=30s"]
    technitium-exporter:
      service_name: "technitium-exporter"
      image_name: "ghcr.io/brioche-works/technitium-dns-prometheus-exporter:master"
      description: "Prometheus exporter for Technitium DNS Server metrics."
      icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/technitium.png"
      dns:
        enabled: false
      auth:
        enabled: false
      network:
        internal: true
        service_port: 8080
        networks:
          - name: "br1"
            ip_address: "192.168.5.59"
      secrets:
        TECHNITIUM_API_DNS_TOKEN: "technitium_api_token"
      env:
        - "TECHNITIUM_API_DNS_BASE_URL=http://192.168.4.53:5380/"
        - "TECHNITIUM_API_DNS_LABEL=technitium"
    technitium-exporter-extended:
      service_name: "technitium-exporter-extended"
      image_name: "ghcr.io/guycalledseven/technitium-dns-prometheus-exporter:latest"
      description: "Extended Prometheus exporter for Technitium DNS with top domains, clients, and DHCP metrics."
      icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/technitium.png"
      dns:
        enabled: false
      auth:
        enabled: false
      network:
        internal: true
        service_port: 9105
        networks:
          - name: "br1"
            ip_address: "192.168.5.63"
      secrets:
        TECHNITIUM_TOKEN: "technitium_api_token"
      env:
        - "TECHNITIUM_BASE_URL=http://192.168.4.53:5380"
        - "SERVER_LABEL=technitium"
        - "TECHNITIUM_STATS_RANGE=LastHour"
        - "TECHNITIUM_TOP_LIMIT=50"
        - "EXPORTER_PORT=9105"
    snmp-exporter:
      service_name: "snmp-exporter"
      image_name: "prom/snmp-exporter:v0.29.0"
      description: "SNMP Exporter for Prometheus. Collects metrics from SNMP-enabled network devices such as the EdgeRouter."
      icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/prometheus.png"
      dns:
        enabled: false
      auth:
        enabled: false
      network:
        internal: true
        service_port: 9116
        networks:
          - name: "br1"
            ip_address: "192.168.5.64"
      mounts:
        - "/mnt/user/appdata/prometheus/snmp.yml:/etc/snmp_exporter/snmp.yml"
    loki:
      service_name: "loki"
      image_name: "grafana/loki:3.6.7"
      description: "Log aggregation system. Stores and indexes logs from all Docker containers and host services."
      icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/grafana-loki.png"
      dns:
        enabled: false
      auth:
        enabled: false
      network:
        internal: true
        service_port: 3100
        networks:
          - name: "br1"
            ip_address: "192.168.5.65"
      mounts:
        - "/mnt/user/appdata/loki/config/loki.yaml:/etc/loki/loki.yaml"
        - "/mnt/user/appdata/loki/data:/loki"
      commands: ["-config.file=/etc/loki/loki.yaml"]
    promtail:
      service_name: "promtail"
      image_name: "grafana/promtail:3.6.7"
      description: "Log collection agent. Scrapes Docker container logs and host syslog, ships to Loki."
      icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/grafana-loki.png"
      dns:
        enabled: false
      auth:
        enabled: false
      network:
        internal: true
        service_port: 9080
        networks:
          - name: "br1"
            ip_address: "192.168.5.66"
      mounts:
        - "/mnt/user/appdata/promtail/promtail.yaml:/etc/promtail/promtail.yaml"
        - "/var/lib/docker/containers:/var/lib/docker/containers:ro"
        - "/var/run/docker.sock:/var/run/docker.sock:ro"
        - "/var/log:/var/log:ro"
      commands: ["-config.file=/etc/promtail/promtail.yaml"]
