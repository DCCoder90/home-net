name: Pulumi Preview

on:
  pull_request:
    branches:
      - main
    paths:
      - 'config/**'
      - 'pulumi/**'
  workflow_dispatch:

jobs:
  pulumi_preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: pulumi/go.mod
          cache-dependency-path: pulumi/go.sum

      - name: Build custom providers
        working-directory: pulumi
        run: bash scripts/build-providers.sh

      - name: Install Pulumi CLI
        uses: pulumi/actions@v6

      - name: Run pulumi preview
        id: preview
        working-directory: pulumi
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        run: |
          pulumi preview --stack ${{ secrets.PULUMI_STACK }} --non-interactive 2>&1 | tee preview-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Post preview to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('pulumi/preview-output.txt', 'utf8');
            const body = `#### Pulumi Preview\n\`\`\`\n${output.slice(-65000)}\n\`\`\``;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('#### Pulumi Preview')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }

      - name: Fail if preview errored
        if: steps.preview.outputs.exit_code != '0'
        run: exit 1
