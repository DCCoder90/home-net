name: Pulumi Apply

on:
  push:
    branches:
      - main
    paths:
      - 'config/**'
      - 'pulumi/**'
  workflow_dispatch:

jobs:
  pulumi_apply:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: pulumi/go.mod
          cache-dependency-path: pulumi/go.sum

      - name: Build custom providers
        working-directory: pulumi
        run: bash scripts/build-providers.sh

      - name: Install Pulumi CLI
        uses: pulumi/actions@v6

      - name: Run pulumi up
        working-directory: pulumi
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        run: |
          pulumi up --stack ${{ secrets.PULUMI_STACK }} --yes --non-interactive
