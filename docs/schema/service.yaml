# Schema for standalone service definition files (config/services/*.yaml).
#
# Each file defines a single top-level key (the service identifier) whose value
# is a ServiceConfig. Fields list type, whether they are required (default: false),
# a default value where applicable, and a description.
#
# Example file structure:
#   my-service:
#     service_name: "my-service"
#     image_name: "myrepo/my-service:latest"
#     ...

ServiceConfig:
  service_name:
    type: string
    required: true
    description: >
      Name of the Docker container. Also used as the base name for Authentik
      application and group resources.

  image_name:
    type: string
    required: true
    description: >
      Docker image to pull, including registry and tag
      (e.g. "grafana/grafana:latest").

  host:
    type: string
    required: false
    default: "tower"
    description: >
      Server to deploy this service to. Must match a key in
      config/servers.yaml. Defaults to "tower".

  description:
    type: string
    required: false
    description: Human-readable description of the service.

  icon:
    type: string
    required: false
    description: >
      URL to an icon image. Stored as the net.unraid.docker.icon container
      label for Unraid UI display.

  commands:
    type: list(string)
    required: false
    description: >
      Command arguments passed to the container, overriding the image's
      default CMD.

  network_mode:
    type: string
    required: false
    description: >
      Docker network mode for the container (e.g. "host"). When set to "host",
      the container shares the host network stack directly. Cannot be combined
      with network.networks — omit the network block entirely when using
      network_mode: host.

  restart_policy:
    type: string
    required: false
    default: "unless-stopped"
    description: >
      Docker restart policy for the container. Valid values: "no", "always",
      "on-failure", "unless-stopped". Defaults to "unless-stopped".

  privileged:
    type: bool
    required: false
    default: false
    description: >
      Run the container in privileged mode (--privileged). Grants full host
      device access and disables most security isolation. Use only when
      capabilities or device passthrough are insufficient.

  shm_size:
    type: int
    required: false
    description: >
      Size of /dev/shm in megabytes. Only set when the container explicitly
      requires a larger shared memory segment (e.g. browsers, some ML workloads).

  capabilities:
    type: map
    required: false
    description: Linux capabilities to add or drop from the container.
    fields:
      add:
        type: list(string)
        required: false
        description: Capabilities to add (e.g. CAP_NET_ADMIN).
      drop:
        type: list(string)
        required: false
        description: Capabilities to drop.

  devices:
    type: map
    required: false
    description: Device passthrough configuration for the container.
    fields:
      gpu:
        type: bool
        required: false
        default: false
        description: >
          Pass /dev/dri into the container. Enables hardware transcoding in
          media servers.
      usb:
        type: bool
        required: false
        default: false
        description: >
          Pass /dev/bus/usb into the container. Required for USB accelerators
          such as a Coral TPU.
      paths:
        type: list(string)
        required: false
        description: >
          Explicit host_path:container_path device strings for other device
          passthrough needs (e.g. "/dev/ttyUSB0:/dev/ttyUSB0").

  mounts:
    type: list(string)
    required: false
    description: >
      Bind mount strings in the format host_path:container_path[:ro]
      (e.g. "/etc/localtime:/etc/localtime:ro").

  volumes:
    type: list(string)
    required: false
    description: Named Docker volume mount strings (e.g. "my_volume:/data").

  env:
    type: list(string)
    required: false
    description: >
      Environment variables injected into the container as KEY=VALUE strings.
      Use ${SECRET_NAME} to reference a generated secret by name.

  secrets:
    type: map(string -> string)
    required: false
    description: >
      Map of environment variable names to Infisical secret keys (from the
      /secrets folder). Pulumi fetches each secret at deploy time and injects
      it as an environment variable.
    example:
      MYSQL_ROOT_PASSWORD: "tower_mysql_root_pwd"
      MYSQL_USER: "tower_mysql_user"

  configfiles:
    type: list(ConfigFile)
    required: false
    description: >
      Application config files to write to the remote host before the container
      starts. Content is fetched from the Infisical /config folder. The file is
      only re-written when its content changes between deploys. Add a
      corresponding mounts entry to expose the file inside the container.

  network:
    type: NetworkConfig
    required: false
    description: >
      Network attachment configuration. Omit entirely when using network_mode.

  dns:
    type: DNSConfig
    required: false
    description: DNS record and reverse-proxy registration settings.

  auth:
    type: AuthConfig
    required: false
    description: Authentik SSO configuration for this service.


ConfigFile:
  path:
    type: string
    required: true
    description: >
      Absolute path on the remote host where the file will be written
      (e.g. "/mnt/user/appdata/myapp/config.yaml").
  key:
    type: string
    required: true
    description: >
      Infisical secret key in the /config folder whose value becomes the
      file's content. Fails hard if the key does not exist in Infisical.
  permissions:
    type: string
    required: false
    default: "0600"
    description: >
      Octal permission string for the written file (e.g. "0644").
      Defaults to "0600".


NetworkConfig:
  internal:
    type: bool
    required: false
    default: false
    description: >
      When true, the service is not exposed externally via Nginx Proxy Manager.
  service_port:
    type: int
    required: false
    description: The port the service listens on inside the container.
  networks:
    type: list(NetworkEntry)
    required: false
    description: >
      Docker networks to attach the container to. Cannot be used together with
      network_mode.


NetworkEntry:
  name:
    type: string
    required: true
    description: >
      Docker network name (e.g. "br1", "br0", or a custom stack network).
      Use br1 for most services accessed via the reverse proxy. Use br0 for
      services that need direct LAN access (mDNS, network discovery, etc.).
  ip_address:
    type: string
    required: false
    description: >
      Static IPv4 address to assign on this network. Use addresses in the
      192.168.4.0/23 range for br1.


DNSConfig:
  enabled:
    type: bool
    required: false
    default: false
    description: >
      When true, Pulumi creates a Technitium DNS record and an Nginx Proxy
      Manager proxy host for this service.
  domain_name:
    type: string
    required: false
    description: >
      Full domain name for the service (e.g. "myapp.example.com"). Required
      when dns.enabled is true.
  forward_host:
    type: string
    required: false
    description: >
      Overrides the NPM proxy destination host for services that have no
      network.networks entry (e.g. host-networked containers on a separate
      subnet). When set, proxy.go uses this instead of the IP derived from
      network.networks.
    examples: ["192.168.1.38"]
  forward_port:
    type: int
    required: false
    description: >
      Overrides the NPM proxy destination port when forward_host is set.
      Defaults to 80 if omitted.
    examples: [5380]
  internal:
    type: bool
    required: false
    description: >
      When true, no Cloudflare record is created and the NPM host uses the
      internal-only access list. When false, overrides network.internal and
      creates a public Cloudflare record. Omit to inherit from network.internal.


AuthConfig:
  enabled:
    type: bool
    required: false
    default: false
    description: >
      When true, Pulumi creates an Authentik application, group, and policy
      binding for this service.
  group:
    type: string
    required: false
    description: >
      Primary Authentik group. Members get full/admin access to the application.
      Defaults to the service name when omitted.
  additional_groups:
    type: list(string)
    required: false
    description: >
      Extra Authentik groups. Pulumi creates each group and adds a policy
      binding. Useful for role-based access (e.g. a read-only viewer group).
  proxy:
    type: ProxyAuth
    required: false
    description: >
      Authentik forward-auth proxy configuration. When enabled, NPM routes all
      traffic for this service's domain through the Authentik proxy outpost
      before forwarding to the service.
  oauth:
    type: OAuthAuth
    required: false
    description: >
      Authentik OAuth2/OIDC provider configuration. Client ID, client secret,
      and issuer URL are exported as Pulumi stack outputs.


ProxyAuth:
  enabled:
    type: bool
    required: false
    default: false
    description: Enable Authentik forward-auth proxy for this service.
  user_secret:
    type: string
    required: false
    description: Infisical secret key for the proxy username.
  pass_secret:
    type: string
    required: false
    description: Infisical secret key for the proxy password.
  auth_secret_name:
    type: string
    required: false
    description: >
      Infisical secret key whose value is injected as an X-Proxy-Secret header
      by NPM. The upstream service must validate this header to ensure requests
      arrive via the proxy. Generate with: openssl rand -hex 32.


OAuthAuth:
  enabled:
    type: bool
    required: false
    default: false
    description: >
      When true, an Authentik OAuth2 provider and application are created for
      this service.
  keys:
    type: map(string -> string)
    required: false
    description: >
      Map of environment variable names to Authentik OAuth provider output
      attributes. Common values: client_id, client_secret, provider_info_url.
    example:
      OAUTH_CLIENT_ID: "client_id"
      OAUTH_CLIENT_SECRET: "client_secret"
      OAUTH_ISSUER_URL: "provider_info_url"
  scopes:
    type: list(string)
    required: false
    description: OAuth scopes to request from Authentik (e.g. openid, profile, email).
  redirect_uris:
    type: list(string)
    required: false
    description: >
      Relative paths appended to the service's domain name to form the complete
      OAuth redirect URIs registered with Authentik (e.g. "/oauth/callback").
